<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electrical Path – Countertop 1.5</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=Open+Sans:wght@400;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #ffffff;
    font-family: 'Open Sans', 'IBM Plex Sans', sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    -webkit-text-size-adjust: 100%;
  }

  /* ── Progress bar — always visible ── */
  #progress-bar-wrap {
    background: #f8f9fb;
    border: 1px solid #e2e6ed;
    border-radius: 10px;
    margin: 10px 12px 6px;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  #step-badge {
    background: #eef2ff;
    color: #246EFF;
    font-size: 14px;
  }

  #progress-dots {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
  }
  .prog-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #d8dce6;
    transition: background 0.35s, box-shadow 0.35s;
    flex-shrink: 0;
  }
  .prog-dot.done {
    background: #246EFF;
    box-shadow: 0 0 0 2px #eef2ff;
  }

  #progress-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .prog-btn {
    padding: 5px 13px;
    border: 1px solid #d8dce6;
    border-radius: 7px;
    background: #ffffff;
    color: #3a3f4a;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
    touch-action: manipulation;
  }
  .prog-btn:hover { background: #f0f4ff; border-color: #b0b8cc; }

  /* ── Canvas area ── */
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }
  canvas {
    display: block;
    position: absolute;
  }

  /* ── Hotspot dots ── */
  .hotspot {
    position: absolute;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #246EFF;
    border: 2px solid #ffffff;
    cursor: pointer;
    transform: translate(-50%, -50%);
    transition: transform 0.2s, background 0.3s;
    z-index: 10;
    animation: pulse-blue 2s infinite;
    user-select: none;
    box-shadow: 0 2px 8px rgba(36,110,255,0.4);
    touch-action: manipulation;
  }
  .hotspot:hover { transform: translate(-50%,-50%) scale(1.25); }
  .hotspot.hidden { display: none !important; }
  .hotspot.done {
    background: #22cc77 !important;
    border-color: #ffffff;
    animation: none !important;
    box-shadow: 0 0 12px #22cc7766;
    cursor: default;
  }
  .hotspot.phase2 {
    background: #246EFF !important;
    animation: pulse-blue 2s infinite !important;
  }
  .hotspot.inactive {
    opacity: 0.3;
    pointer-events: none;
  }

  @keyframes pulse-blue {
    0%   { box-shadow: 0 0 0 0 rgba(36,110,255,0.6); }
    70%  { box-shadow: 0 0 0 9px rgba(36,110,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(36,110,255,0); }
  }
  @keyframes pulse-orange {
    0%   { box-shadow: 0 0 0 0 rgba(255,140,0,0.7); }
    70%  { box-shadow: 0 0 0 11px rgba(255,140,0,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,140,0,0); }
  }

  /* ── Label tooltip ── */
  .label-box {
    position: absolute;
    background: white;
    border: 2px solid #246EFF;
    border-radius: 5px;
    padding: 8px 32px 8px 12px;
    font-size: 14px;
    font-weight: 600;
    color: #1a2540;
    white-space: normal;
    max-width: 260px;
    line-height: 1.5;
    pointer-events: auto;
    z-index: 20;
    box-shadow: 0 3px 10px rgba(0,0,0,0.12);
  }
  .label-box.phase2 { border-color: #246EFF; }
  .label-box.sbc-desc {
    white-space: normal;
    max-width: 260px;
    line-height: 1.5;
    padding: 8px 32px 8px 12px;
  }
  .label-close {
    position: absolute;
    top: 4px; right: 6px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #eef2ff;
    border: none;
    color: #246EFF;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    transition: background 0.15s;
  }
  .label-close:hover { background: #dde8ff; }


  /* ── Overlay modals ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,20,50,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .overlay.hidden { display: none; }

  .modal {
    background: #ffffff;
    border-radius: 12px;
    padding: 22px 26px 20px;
    max-width: 380px;
    width: 88%;
    position: relative;
    box-shadow: 0 20px 50px rgba(0,0,0,0.18);
    animation: slide-up 0.3s ease;
  }
  @keyframes slide-up {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .modal .icon { font-size: 28px; margin-bottom: 8px; display: block; }
  .modal h2 {
    font-size: 16px;
    color: #1a2540;
    margin-bottom: 7px;
    font-weight: 700;
  }
  .modal h2.green { color: #22aa66; }
  .modal p {
    font-size: 14px;
    color: #4a5568;
    line-height: 1.6;
  }
  .modal-close {
    position: absolute;
    top: 10px; right: 12px;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: #f0f4ff;
    border: none;
    color: #7788aa;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: inherit;
    transition: background 0.2s;
  }
  .modal-close:hover { background: #e0e8ff; color: #1a2540; }
  .start-btn {
    margin-top: 14px;
    padding: 8px 18px;
    background: #246EFF;
    color: white;
    border: none;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .start-btn:hover { background: #1a5eee; }
</style>
</head>
<body>

<!-- Progress bar — always visible -->
<div id="progress-bar-wrap">
  <div id="step-badge" style="visibility:hidden">Step 0 / 7</div>
  <div id="progress-dots">
    <div class="prog-dot" id="dot-0"></div>
    <div class="prog-dot" id="dot-1"></div>
    <div class="prog-dot" id="dot-2"></div>
    <div class="prog-dot" id="dot-3"></div>
    <div class="prog-dot" id="dot-4"></div>
    <div class="prog-dot" id="dot-5"></div>
    <div class="prog-dot" id="dot-6"></div>
  </div>
  <div id="progress-actions">
    <button class="prog-btn" id="reset-btn">↺ Reset</button>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div class="hotspot" id="hs-2"></div>
  <div class="hotspot hidden" id="hs-3"></div>
  <div class="hotspot hidden" id="hs-4"></div>
  <div class="hotspot hidden" id="hs-5"></div>
  <div class="hotspot hidden" id="hs-6"></div>
  <div class="hotspot hidden" id="hs-7"></div>
  <div class="hotspot hidden" id="hs-8"></div>
  <div class="hotspot hidden" id="hs-9"></div>
</div>
<div class="overlay" id="intro-overlay">
  <div class="modal">
    <p>Click on the <strong>BUC hotspot</strong> to get started, then make sure you click on the other four components to continue.</p>
    <button class="start-btn" id="intro-ok">Let's go →</button>
  </div>
</div>

<!-- Completion modal -->
<div class="overlay hidden" id="completion-overlay">
  <div class="modal">
    <span class="icon">🎉</span>
    <h2 class="green">Great job!</h2>
    <p>Now that we have explored how power flows across CT 1.5, let's follow the data path.</p>
    <button class="start-btn" id="completion-close">Next →</button>
  </div>
</div>

let imgEl=null, canvasW=0, canvasH=0, offX=0, offY=0, scale=1, dpr=1;
let drawnLines=new Set(), lineProgress={}, animating=new Set();
let phase=1, exploredHS=new Set(), bucbClicked=false, completionShown=false;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function init() {
  imgEl = new Image();
  imgEl.onload = () => { fitCanvas(); positionHotspots(); render(); };
  imgEl.src = IMG_SRC;
  window.addEventListener('resize', () => { fitCanvas(); positionHotspots(); render(); });
  window.addEventListener('orientationchange', () => setTimeout(() => { fitCanvas(); positionHotspots(); render(); }, 120));
}

function fitCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  dpr = Math.min(window.devicePixelRatio || 1, 3);   // cap so huge screens don't over-allocate
  scale = Math.min(ww/IMG_W, wh/IMG_H);
  canvasW = Math.round(IMG_W*scale);
  canvasH = Math.round(IMG_H*scale);
  // On-screen (CSS) size stays in CSS pixels…
  canvas.style.width  = canvasW+'px';
  canvas.style.height = canvasH+'px';
  // …while the backing store renders at physical resolution for crisp output
  canvas.width  = Math.round(canvasW*dpr);
  canvas.height = Math.round(canvasH*dpr);
  offX = Math.round((ww-canvasW)/2);
  offY = Math.round((wh-canvasH)/2);
  canvas.style.left = offX+'px';
  canvas.style.top  = offY+'px';
}

function positionHotspots() {
  Object.entries(HOTSPOTS).forEach(([id,def]) => {
    const el = document.getElementById('hs-'+id);
    if (!el) return;
    el.style.left = (offX + def.x/100*canvasW)+'px';
    el.style.top  = (offY + def.y/100*canvasH)+'px';
  });
  document.querySelectorAll('.label-box').forEach(lb => {
    const id = lb.dataset.hsid;
    if (id) positionLabel(lb, parseInt(id));
  });
}

function render() {
  ctx.setTransform(dpr,0,0,dpr,0,0);   // 1 unit = 1 CSS px, backed by dpr× physical px
  ctx.clearRect(0,0,canvasW,canvasH);
  if (imgEl) ctx.drawImage(imgEl,0,0,canvasW,canvasH);
  [...drawnLines,...animating].forEach(id => drawLine(id, lineProgress[id]??1));
}

function drawLine(id, p) {
  const d = LINES[id]; if (!d) return;
  const x1=d.x1/100*canvasW, y1=d.y1/100*canvasH;
  const x2=d.x2/100*canvasW, y2=d.y2/100*canvasH;
  const ex=x1+(x2-x1)*p, ey=y1+(y2-y1)*p;
  ctx.save();
  if (d.c==='y') { ctx.shadowColor='#ffe000'; ctx.shadowBlur=16; ctx.strokeStyle='#ffe033'; }
  else           { ctx.shadowColor='#f4610e'; ctx.shadowBlur=18; ctx.strokeStyle='#f4610e'; }
  ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(ex,ey); ctx.stroke();
  ctx.shadowBlur=0;
  ctx.strokeStyle = d.c==='y' ? '#fffde7' : '#ffd0b5';
  ctx.lineWidth=1.8;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(ex,ey); ctx.stroke();
  ctx.restore();
}

const SPEED = 0.05;
function animateGroups(groups, onDone) {
  let gi=0;
  function nextGroup() {
    if (gi>=groups.length) { onDone&&onDone(); return; }
    const grp=groups[gi++];
    grp.forEach(id=>{ lineProgress[id]=0; animating.add(id); });
    function step() {
      let allDone=true;
      grp.forEach(id=>{ lineProgress[id]=Math.min(1,(lineProgress[id]||0)+SPEED); if(lineProgress[id]<1) allDone=false; });
      render();
      if (!allDone) { requestAnimationFrame(step); return; }
      grp.forEach(id=>{ drawnLines.add(id); animating.delete(id); });
      render(); setTimeout(nextGroup,180);
    }
    requestAnimationFrame(step);
  }
  nextGroup();
}

function animateLines(ids, onDone) {
  ids.forEach(id=>{ lineProgress[id]=0; animating.add(id); });
  function step() {
    let allDone=true;
    ids.forEach(id=>{ lineProgress[id]=Math.min(1,(lineProgress[id]||0)+SPEED); if(lineProgress[id]<1) allDone=false; });
    render();
    if (!allDone) { requestAnimationFrame(step); return; }
    ids.forEach(id=>{ drawnLines.add(id); animating.delete(id); });
    render(); onDone&&onDone();
  }
  requestAnimationFrame(step);
}

function positionLabel(lb, id) {
  const def = HOTSPOTS[id]; if (!def) return;
  const cx = offX + def.x/100*canvasW;
  const cy = offY + def.y/100*canvasH;
  const anchor = def.anchor || 'above';
  lb.style.transform=''; lb.style.left=''; lb.style.top='';
  // Position initially
  if (anchor==='above') {
    lb.style.left=cx+'px'; lb.style.top=(cy-14)+'px';
    lb.style.transform='translate(-50%,-100%)';
  } else if (anchor==='right') {
    lb.style.left=(cx+14)+'px'; lb.style.top=cy+'px';
    lb.style.transform='translateY(-50%)';
  } else if (anchor==='left') {
    lb.style.left=(cx-14)+'px'; lb.style.top=cy+'px';
    lb.style.transform='translate(-100%,-50%)';
  }
  // After layout, clamp to viewport
  requestAnimationFrame(() => {
    const r = lb.getBoundingClientRect();
    const vw = window.innerWidth, vh = window.innerHeight;
    let l = parseFloat(lb.style.left) || 0;
    let t = parseFloat(lb.style.top) || 0;
    if (r.right > vw - 8)  { lb.style.transform='translate(-100%,-50%)'; lb.style.left=(cx-14)+'px'; lb.style.top=cy+'px'; }
    if (r.left < 8)        { lb.style.transform='translateY(-50%)';       lb.style.left=(cx+14)+'px'; lb.style.top=cy+'px'; }
    if (r.top < 8)         { lb.style.transform='translate(-50%,0)';      lb.style.left=cx+'px';      lb.style.top=(cy+14)+'px'; }
  });
}

function showLabel(id, isPhase2) {
  clearLabels();
  const wrap = document.getElementById('canvas-wrap');
  const lb = document.createElement('div');
  lb.className='label-box sbc-desc'+(isPhase2?' phase2':'');
  lb.dataset.hsid=id;
  const hs = HOTSPOTS[id];
  lb.innerHTML = '<strong>' + hs.label + '</strong>' + (hs.desc ? '<br><span style="font-weight:400">' + hs.desc + '</span>' : '') +
    '<button class="label-close" onclick="clearLabels()">✕</button>';
  wrap.appendChild(lb);
  positionLabel(lb, id);
  return lb;
}
function clearLabels() { document.querySelectorAll('.label-box').forEach(el=>el.remove()); }

function updateStepBadge() {
  // total steps: 0 = start, 1 = BUC clicked, 2-5 = each secondary hs, phase2 = step 5
  const n = exploredHS.size;
  document.getElementById('step-badge').textContent = 'Step ' + n + ' / 7';
  for(let i=0;i<7;i++) {
    const dot = document.getElementById('dot-'+i);
    if (i < n) dot.classList.add('done'); else dot.classList.remove('done');
  }
}

document.getElementById('hs-2').addEventListener('click', () => {
  if (bucbClicked) return;
  bucbClicked = true;
  document.getElementById('hs-2').style.cursor='default';
  document.getElementById('step-badge').style.visibility = 'visible';
  showLabel(2, false);
  animateGroups(LINE_GROUPS, () => {
    clearLabels();
    document.getElementById('hs-2').classList.add('hidden');
    setTimeout(revealSecondary, 250);
  });
});

function revealSecondary() {
  [3,4,5,6,7,8,9].forEach((id,i)=>setTimeout(()=>document.getElementById('hs-'+id).classList.remove('hidden'),i*180));
}

[3,4,5,6,7,8,9].forEach(id => {
  document.getElementById('hs-'+id).addEventListener('click', () => {
    if (phase===2 && id===6) { onClickSBCPhase2(); return; }
    if (exploredHS.has(id)) return;
    exploredHS.add(id);
    document.getElementById('hs-'+id).classList.add('done');
    showLabel(id, false);
    updateStepBadge();
    if (exploredHS.size===7 && !completionShown) {
      completionShown=true; setTimeout(showCompletion,700);
    }
  });
});

function showCompletion() {
  clearLabels();
  document.getElementById('completion-overlay').classList.remove('hidden');
}

document.getElementById('completion-close').addEventListener('click', () => {
  document.getElementById('completion-overlay').classList.add('hidden');
  startPhase2();
});

function startPhase2() {
  phase=2;
  [3,4,5,7,8,9].forEach(id=>document.getElementById('hs-'+id).classList.add('inactive'));
  const hs6=document.getElementById('hs-6');
  hs6.classList.remove('done','inactive');
  hs6.classList.add('phase2');
  showLabel(6, true);
}

function onClickSBCPhase2() {
  clearLabels();
  const hs6 = document.getElementById('hs-6');
  hs6.style.pointerEvents='none';
  hs6.classList.add('done');
  animateLines(PHASE2_LINES, ()=>{
    // Show SBC description callout
    const wrap = document.getElementById('canvas-wrap');
    const lb = document.createElement('div');
    lb.className='label-box phase2 sbc-desc';
    lb.dataset.hsid=6;
    lb.innerHTML='<strong>' + HOTSPOTS[6].label + '</strong><br><span style="font-weight:400">As the brain of the CT 1.5 all of the data is received and assessed by the SBC.</span>' +
      '<button class="label-close" onclick="clearLabels()">✕</button>';
    wrap.appendChild(lb);
    positionLabel(lb, 6);
  });
}

document.getElementById('intro-ok').addEventListener('click', () => {
  document.getElementById('intro-overlay').classList.add('hidden');
});

document.getElementById('reset-btn').addEventListener('click', () => {
  drawnLines.clear(); animating.clear(); lineProgress={};
  exploredHS.clear(); bucbClicked=false; completionShown=false; phase=1;
  clearLabels();
  [3,4,5,6,7,8,9].forEach(id=>{ const el=document.getElementById('hs-'+id); el.className='hotspot hidden'; el.style.pointerEvents=''; });
  const hs2=document.getElementById('hs-2');
  hs2.className='hotspot'; hs2.style.cursor='pointer';
  document.getElementById('completion-overlay').classList.add('hidden');
  document.getElementById('intro-overlay').classList.remove('hidden');
  document.getElementById('step-badge').style.visibility = 'hidden';
  updateStepBadge();
  render();
});

init();
</script>
</body>
</html>
